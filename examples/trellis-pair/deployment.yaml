# deployment.yaml — transport bindings for the trellis pair.
#
# Both binaries (fitter, applier) consume "trellis.observation"
# from the same UDP multicast group. Both observers look at the
# same upstream stream, but the applier cannot fit on the data
# it's acting on because it's a separate process with no path
# back to the fitter's fitting state — substrate-derivation
# discipline by architecture.
#
# trellis.kernel uses NATS (reliable, ordered) — the fitter
# ships stable perspectives slowly; the applier must receive
# them in order.
#
# trellis.action / trellis.receipt use NATS — control-plane
# messaging with the downstream sink.

channels:
  # Upstream observations: high-frequency, lossy-acceptable,
  # broadcast to many.
  "trellis.observation":
    transport: udp_multicast
    group: "239.7.7.7"
    port: 9000

  # Kernel updates: slow cadence, reliable delivery required,
  # ordered per fitter.
  "trellis.kernel":
    transport: nats
    url: "nats://nats-control:4222"

  # Actions emitted by the applier downstream.
  "trellis.action":
    transport: nats
    url: "nats://nats-control:4222"

  # Receipts arriving back from downstream.
  "trellis.receipt":
    transport: nats
    url: "nats://nats-control:4222"

# For testing: swap the whole map to in-memory.
# Uncomment to use:
#
# channels:
#   "trellis.*":
#     transport: in_memory
