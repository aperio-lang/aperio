name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pages deployment requires these tokens.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; cancel queued runs
# but never interrupt a deploy already publishing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-toc
          key: mdbook-${{ runner.os }}-v1

      - name: Install mdbook + preprocessors
        run: |
          set -e
          for tool in mdbook mdbook-toc; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              cargo install --locked "$tool"
            fi
          done

      - name: Build docs
        run: mdbook build docs

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      # mdbook-admonish + mdbook-linkcheck deferred — each has a
      # compat issue with mdbook 0.5.x. Re-add when upstream catches up.

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
